name: Production Rollback

run-name: >-
  Rollback to ${{ inputs.target_sha }}
  (frontend=${{ inputs.rollback_frontend }}, backend=${{ inputs.rollback_backend }})

on:
  workflow_dispatch:
    inputs:
      target_sha:
        description: "Commit SHA from main to redeploy"
        required: true
        type: string
      rollback_frontend:
        description: "Redeploy frontend (Azure Static Web Apps)"
        required: true
        default: true
        type: boolean
      rollback_backend:
        description: "Redeploy backend (Azure Functions)"
        required: true
        default: true
        type: boolean
      reason:
        description: "Optional rollback reason"
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: production-rollback
  cancel-in-progress: false

jobs:
  validate_target:
    name: Validate Target Commit
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.validate.outputs.sha }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate target commit
        id: validate
        env:
          TARGET_SHA: ${{ inputs.target_sha }}
          ROLLBACK_FRONTEND: ${{ inputs.rollback_frontend }}
          ROLLBACK_BACKEND: ${{ inputs.rollback_backend }}
        run: |
          set -euo pipefail

          if [ "${ROLLBACK_FRONTEND}" != "true" ] && [ "${ROLLBACK_BACKEND}" != "true" ]; then
            echo "At least one rollback target must be selected."
            exit 1
          fi

          git fetch origin main --quiet

          if ! git cat-file -e "${TARGET_SHA}^{commit}" 2>/dev/null; then
            echo "Invalid commit SHA: ${TARGET_SHA}"
            exit 1
          fi

          if ! git merge-base --is-ancestor "${TARGET_SHA}" "origin/main"; then
            echo "Commit ${TARGET_SHA} is not reachable from origin/main."
            exit 1
          fi

          echo "sha=${TARGET_SHA}" >> "$GITHUB_OUTPUT"

  rollback_frontend:
    name: Rollback Frontend
    if: ${{ inputs.rollback_frontend }}
    runs-on: ubuntu-latest
    needs: validate_target
    env:
      NEXT_PUBLIC_API_BASE_URL: ${{ vars.NEXT_PUBLIC_API_BASE_URL }}
    steps:
      - name: Checkout target commit
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate_target.outputs.sha }}
          submodules: true
          lfs: false

      - name: Redeploy frontend
        id: deploy_frontend
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_GENTLE_FLOWER_07EDAED0F }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "./app"
          app_build_command: "npm run build"
          api_location: ""
          output_location: ".next"

  rollback_backend:
    name: Rollback Backend
    if: ${{ inputs.rollback_backend }}
    runs-on: ubuntu-latest
    needs: validate_target
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout target commit
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate_target.outputs.sha }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish Functions
        run: dotnet publish backend/src/LearnEnglish.Functions/LearnEnglish.Functions.csproj --configuration Release --output backend/publish

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Redeploy backend
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ vars.AZURE_FUNCTIONAPP_NAME_BACKEND }}
          package: backend/publish

  rollback_summary:
    name: Rollback Summary
    runs-on: ubuntu-latest
    needs:
      - validate_target
      - rollback_frontend
      - rollback_backend
    if: ${{ always() }}
    steps:
      - name: Write summary
        env:
          TARGET_SHA: ${{ needs.validate_target.outputs.sha }}
          FRONTEND_SELECTED: ${{ inputs.rollback_frontend }}
          BACKEND_SELECTED: ${{ inputs.rollback_backend }}
          FRONTEND_RESULT: ${{ needs.rollback_frontend.result }}
          BACKEND_RESULT: ${{ needs.rollback_backend.result }}
          REASON: ${{ inputs.reason }}
        run: |
          {
            echo "## Production Rollback"
            echo ""
            echo "- Target SHA: \`${TARGET_SHA}\`"
            echo "- Frontend selected: \`${FRONTEND_SELECTED}\`"
            echo "- Backend selected: \`${BACKEND_SELECTED}\`"
            echo "- Frontend job result: \`${FRONTEND_RESULT}\`"
            echo "- Backend job result: \`${BACKEND_RESULT}\`"
            echo "- Triggered by: \`${{ github.actor }}\`"
            if [ -n "${REASON}" ]; then
              echo "- Reason: ${REASON}"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
